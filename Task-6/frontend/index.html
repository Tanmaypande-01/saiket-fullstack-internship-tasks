<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple User Management</title>

    <!-- Bootstrap CSS-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!--CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container">
        <span class="navbar-brand mb-0 h1">User Management System</span>
      </div>
    </nav>

    <div class="container">
      <!-- User Form Section -->
      <div class="card mb-4">
        <div class="card-header">
          <h5 id="form-title" class="mb-0">Add New User</h5>
        </div>
        <div class="card-body">
          <!-- This form is used for both adding and updating users -->
          <form id="user-form">
            <!-- Hidden field to store the user id when editing -->
            <input type="hidden" id="user-id" />

            <div class="row g-3">
              <div class="col-md-4">
                <label for="name" class="form-label">Name</label>
                <input
                  type="text"
                  id="name"
                  class="form-control"
                  placeholder="Enter name"
                  required
                />
              </div>
              <div class="col-md-4">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Enter email"
                  required
                />
              </div>
              <div class="col-md-4">
                <label for="age" class="form-label">Age</label>
                <input
                  type="number"
                  id="age"
                  class="form-control"
                  placeholder="Enter age"
                  min="0"
                  required
                />
              </div>
            </div>

            <div class="mt-3 d-flex gap-2">
              <button type="submit" class="btn btn-primary" id="submit-btn">
                Add User
              </button>
              <button type="button" class="btn btn-secondary" id="cancel-edit">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- User List Section -->
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Users List</h5>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped table-hover">
              <thead class="table-dark">
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Age</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <!-- Rows will be added here using JavaScript -->
              </tbody>
            </table>
          </div>
          <p id="no-users-message" class="text-muted mb-0 d-none">
            No users found. Add a user using the form above.
          </p>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS (for optional features like modal, not required here but included) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <!-- Custom JS -->
    <script src="script.js"></script>
  </body>
  </html>
